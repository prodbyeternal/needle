name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux:
    name: Linux ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: AppImage
            artifact: NEEDLE-linux-x64-AppImage
            pattern: dist/*.AppImage
          - target: deb
            artifact: NEEDLE-linux-x64-deb
            pattern: dist/*.deb
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Linux ${{ matrix.target }}
        run: npx electron-builder --linux ${{ matrix.target }} --x64 --publish never

      - name: Upload Linux ${{ matrix.target }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.pattern }}
          if-no-files-found: error

  mac:
    name: macOS ${{ matrix.arch }} DMG
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            artifact: NEEDLE-macos-intel-dmg
          - arch: arm64
            artifact: NEEDLE-macos-apple-silicon-dmg
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate macOS icon
        run: |
          mkdir -p build/icon.iconset
          sips -z 16 16 assets/icons/needle.png --out build/icon.iconset/icon_16x16.png
          sips -z 32 32 assets/icons/needle.png --out build/icon.iconset/icon_16x16@2x.png
          sips -z 32 32 assets/icons/needle.png --out build/icon.iconset/icon_32x32.png
          sips -z 64 64 assets/icons/needle.png --out build/icon.iconset/icon_32x32@2x.png
          sips -z 128 128 assets/icons/needle.png --out build/icon.iconset/icon_128x128.png
          sips -z 256 256 assets/icons/needle.png --out build/icon.iconset/icon_128x128@2x.png
          sips -z 256 256 assets/icons/needle.png --out build/icon.iconset/icon_256x256.png
          sips -z 512 512 assets/icons/needle.png --out build/icon.iconset/icon_256x256@2x.png
          sips -z 512 512 assets/icons/needle.png --out build/icon.iconset/icon_512x512.png
          sips -z 1024 1024 assets/icons/needle.png --out build/icon.iconset/icon_512x512@2x.png
          iconutil -c icns build/icon.iconset -o assets/icons/needle.icns

      - name: Build macOS ${{ matrix.arch }} DMG
        run: npx electron-builder --mac dmg --${{ matrix.arch }} --publish never

      - name: Upload macOS ${{ matrix.arch }} DMG
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*.dmg
          if-no-files-found: error

  windows:
    name: Windows ${{ matrix.label }} Setup
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: ia32
            label: x86
            artifact: NEEDLE-windows-x86-setup
          - arch: x64
            label: x64
            artifact: NEEDLE-windows-x64-setup
          - arch: arm64
            label: ARM64
            artifact: NEEDLE-windows-arm64-setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows ${{ matrix.label }} setup
        run: npx electron-builder --win nsis --${{ matrix.arch }} --publish never

      - name: Upload Windows ${{ matrix.label }} setup
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*.exe
          if-no-files-found: error

  release:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs:
      - linux
      - mac
      - windows
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Attach installers to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
